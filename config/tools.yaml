            valueType: string
          - type: defaults
            domain: NSGlobalDomain
            key: KeyRepeat
            value: "2"
            valueType: int
          - type: defaults
            domain: NSGlobalDomain
            key: InitialKeyRepeat
            value: "15"
            valueType: int

      - name: "Misc"
        description: "System tweaks"
        checked: true
        steps:
          - type: defaults
            domain: com.apple.desktopservices
            key: DSDontWriteNetworkStores
            value: "true"
            valueType: bool
          - type: defaults
            domain: com.apple.coreservices.useractivityd
            key: ActivityCacheAllowed
            value: "false"
            valueType: bool
