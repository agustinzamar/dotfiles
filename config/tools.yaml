          - type: cask
            package: finetune
            skip: "test -d /Applications/Finetune.app"

      - name: "TypeWhisper"
        description: "Speech-to-text transcription tool"
        checked: true
        steps:
          - type: tap
            repo: "typewhisper/tap"
          - type: cask
            package: "typewhisper/tap/typewhisper"
            skip: "test -d '/Applications/TypeWhisper.app'"

      - name: "Spotify"
        description: "Music streaming app"
        checked: true
        steps:
          - type: cask
            package: spotify
            skip: "test -d '/Applications/Spotify.app'"

      - name: "Ytsage"
        description: "Modern YouTube downloader with PySide6 GUI"
        checked: true
        steps:
          - type: run
            command: "pipx install ytsage"
            skip: "which ytsage"

      - name: "Castor"
        description: "Stream web video to your TV via DLNA/Chromecast"
        checked: true
        steps:
          - type: run
            command: "brew install --cask stupside/tap/castor"
            skip: "test -f /Applications/Castor.app || which castor"

      - name: "Linear Mouse"
        description: "Customize mouse buttons, speed, and gestures"
        checked: true
        steps:
          - type: cask
            package: linearmouse
            skip: "test -d /Applications/LinearMouse.app"

  # ── System ────────────────────────────────────────────
  - name: "System"
    tools:
      - name: "Finder"
        description: "Finder preferences"
        checked: true
        steps:
          - type: run
            command: "killall Finder 2>/dev/null; true"
            skip: "killall -0 Finder 2>/dev/null || true"
          - type: defaults
            domain: com.apple.finder
            key: AppleShowAllExtensions
            value: "true"
            valueType: bool
          - type: defaults
            domain: com.apple.finder
            key: AppleShowAllFiles
            value: "true"
            valueType: bool
          - type: defaults
            domain: com.apple.finder
            key: ShowPathbar
            value: "true"
            valueType: bool
          - type: defaults
            domain: com.apple.finder
            key: _FXShowPosixPathInTitle
            value: "true"
            valueType: bool

      - name: "Dock"
        description: "Dock preferences"
        checked: true
        steps:
          - type: defaults
            domain: com.apple.dock
            key: autohide
            value: "true"
            valueType: bool
          - type: defaults
            domain: com.apple.dock
            key: show-recents
            value: "false"
            valueType: bool
          - type: defaults
            domain: com.apple.dock
            key: orientation
            value: "left"
            valueType: string

      - name: "Screenshots"
        description: "Screenshot preferences"
        checked: true
        steps:
          - type: defaults
            domain: com.apple.screencapture
            key: type
            value: "png"
            valueType: string
          - type: defaults
            domain: com.apple.screencapture
            key: location
            value: "${HOME}/Desktop"
            valueType: string

      - name: "Text & Input"
        description: "Keyboard and scroll preferences"
        checked: true
        steps:
