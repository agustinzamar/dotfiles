# config/tools.yaml
vars:
  GitHubPAT:
    description: "GitHub Personal Access Token"
    why: "Used by shadcn/ui MCP server to fetch component data from GitHub"
    hint: "Create at github.com/settings/tokens → New token (classic) → scope: public_repo"
  GitName:
    description: "Your full name"
    why: "Used in .gitconfig for commit authorship"
    hint: "e.g. Agustin Zamar"
  GitEmail:
    description: "Your email address"
    why: "Used in .gitconfig for commit authorship"
    hint: "e.g. agustin@example.com"
  GitGPGKey:
    description: "GPG signing key"
    why: "Used to sign Git commits"
    hint: "Enter GPG key ID, for example 0123456789ABCDEF"

categories:
  # ── Base ──────────────────────────────────────────────
  - name: "Base"
    tools:
      - name: "Xcode CLT"
        description: "Command Line Tools (git, compilers, etc.)"
        checked: true
        steps:
          - type: run
            command: "xcode-select --install 2>/dev/null; true"
            skip: "xcode-select -p &>/dev/null"

      - name: "Homebrew"
        description: "Package manager"
        checked: true
        steps:
          - type: run
            command: '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
            skip: "which brew"

      - name: "SSH Keychain"
        description: "Add SSH keys to Apple Keychain"
        checked: true
        steps:
          - type: run
            command: 'for key in ${HOME}/.ssh/id_*; do case "$key" in *.pub|*.revoked) continue ;; esac; ssh-add --apple-use-keychain "$key" 2>/dev/null; done'
            skip: "ssh-add -l | grep -q ."

  # ── Shell ─────────────────────────────────────────────
  - name: "Shell"
    tools:
      - name: "Oh My Zsh"
        description: "Zsh framework"
        checked: true
        steps:
          - type: run
            command: 'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"'
            env:
              RUNZSH: "no"
              CHSH: "no"
              KEEP_ZSHRC: "yes"
            skip: "test -d ${HOME}/.oh-my-zsh"

      - name: "Shell Config (.zshrc)"
        description: "Zsh config with OMZ plugins and custom loader"
        checked: true
        steps:
          - type: symlink
            from: "config/zsh/.zshrc"
            to: "${HOME}/.zshrc"

      - name: "Powerlevel10k"
        description: "Prompt theme (robbyrussell style)"
        depends_on: ["Oh My Zsh"]
        checked: true
        steps:
          - type: git-clone
            repo: "https://github.com/romkatv/powerlevel10k.git"
            dest: "${HOME}/.oh-my-zsh/custom/themes/powerlevel10k"
            depth: 1
          - type: symlink
            from: "config/p10k/.p10k.zsh"
            to: "${HOME}/.p10k.zsh"

      - name: "Exports"
        description: "PATH, editor, and environment variables"
        checked: true
        steps:
          - type: symlink
            from: "home/.exports"
            to: "${HOME}/.dotfiles-home/.exports"

      - name: "Bash"
        description: "Modern Bourne-Again Shell"
        checked: true
        steps:
          - type: brew
            package: bash

      - name: "zsh-autosuggestions"
        description: "Fish-like autosuggestions"
        depends_on: ["Oh My Zsh"]
        checked: true
        steps:
          - type: omz-plugin
            repo: "https://github.com/zsh-users/zsh-autosuggestions"

      - name: "fzf-tab"
        description: "Fuzzy tab completion"
        depends_on: ["Oh My Zsh"]
        checked: true
        steps:
          - type: omz-plugin
            repo: "https://github.com/Aloxaf/fzf-tab"

      - name: "fast-syntax-highlighting"
        description: "Syntax highlighting in shell"
        depends_on: ["Oh My Zsh"]
        checked: true
        steps:
          - type: omz-plugin
            repo: "https://github.com/zdharma-continuum/fast-syntax-highlighting"

      - name: "Aliases: System"
        description: "sudo, flushdns, showfiles, ports, mysqlroot"
        depends_on: ["Vs Code", "Mysql Client"]
        checked: true
        steps:
          - type: symlink
            from: "home/aliases/system.zsh"
            to: "${HOME}/.dotfiles-home/aliases/system.zsh"

      - name: "Aliases: Essentials"
        description: "cd, cat/bat, ls/eza aliases, catcopy"
        depends_on: ["Bat", "Eza"]
        checked: true
        steps:
          - type: symlink
            from: "home/aliases/essentials.zsh"
            to: "${HOME}/.dotfiles-home/aliases/essentials.zsh"

      - name: "Aliases: Git"
        description: "nah, push, pull, uncommit, branches, gecor"
        depends_on: ["Gh", "Fzf"]
        checked: true
        steps:
          - type: symlink
            from: "home/aliases/git.zsh"
            to: "${HOME}/.dotfiles-home/aliases/git.zsh"

      - name: "Aliases: Editors"
        description: "PhpStorm launcher"
        depends_on: ["Vs Code", "Phpstorm", "Neovim"]
        checked: true
        steps:
          - type: symlink
            from: "home/aliases/editors.zsh"
            to: "${HOME}/.dotfiles-home/aliases/editors.zsh"

      - name: "Aliases: Config"
        description: "zshconfig, ohmyzsh, opencodeconfig, claudeconfig"
        depends_on: ["Oh My Zsh"]
        checked: true
        steps:
          - type: symlink
            from: "home/aliases/config.zsh"
            to: "${HOME}/.dotfiles-home/aliases/config.zsh"

      - name: "Functions: Git"
        description: "ghopen, clone, pr, git-prune-local"
        depends_on: ["Gh", "Fzf"]
        checked: true
        steps:
          - type: symlink
            from: "home/functions/git.zsh"
            to: "${HOME}/.dotfiles-home/functions/git.zsh"

      - name: "Functions: Util"
        description: "mkd, digga, killport, disablesleep-*"
        checked: true
        steps:
          - type: symlink
            from: "home/functions/util.zsh"
            to: "${HOME}/.dotfiles-home/functions/util.zsh"

  # ── Terminal ──────────────────────────────────────────
  - name: "Terminal"
    tools:
      - name: "Ghostty"
        description: "Terminal emulator"
        checked: true
        steps:
          - type: cask
            package: ghostty
          - type: symlink
            from: "config/ghostty/config"
            to: "${HOME}/.config/ghostty/config"

      - name: "Muxy"
        description: "Terminal multiplexer"
        checked: true
        steps:
          - type: tap
            repo: "muxy-app/tap"
          - type: cask
            package: "muxy-app/tap/muxy"
            skip: "test -d /Applications/Muxy.app"
          - type: symlink
            from: "config/muxy/conf.hjson"
            to: "${HOME}/.config/muxy/conf.hjson"
          - type: symlink
            from: "config/muxy/verbs.hjson"
            to: "${HOME}/.config/muxy/verbs.hjson"
          - type: symlink
            from: "config/ghostty/config"
            to: "${HOME}/Library/Application Support/Muxy/ghostty.conf"

      - name: "Tmux"
        description: "Terminal multiplexer"
        checked: true
        steps:
          - type: brew
            package: tmux
          - type: symlink
            from: "config/tmux/tmux.conf"
            to: "${HOME}/.config/tmux/tmux.conf"

      - name: "Fzf"
        description: "Fuzzy finder"
        checked: true
        steps:
          - type: brew
            package: fzf
          - type: run
            command: "$(brew --prefix)/opt/fzf/install --all --no-bash --no-fish"
            skip: "test -f ${HOME}/.fzf.zsh"

      - name: "Zoxide"
        description: "Smarter cd"
        checked: true
        steps:
          - type: brew
            package: zoxide

      - name: "Tldr"
        description: "Practical command examples instead of man pages"
        checked: true
        steps:
          - type: brew
            package: tlrc

      - name: "Opentmux"
        description: "tmux session manager wrapper"
        depends_on: ["Tmux"]
        checked: true
        steps:
          - type: run
            command: "npm install -g opentmux"
            skip: "which opentmux"

      - name: "Yazi"
        description: "Terminal file manager"
        checked: true
        steps:
          - type: brew
            package: yazi
          - type: symlink
            from: "config/yazi/yazi.toml"
            to: "${HOME}/.config/yazi/yazi.toml"
          - type: symlink
            from: "config/yazi/keymap.toml"
            to: "${HOME}/.config/yazi/keymap.toml"
          - type: symlink
            from: "config/yazi/theme.toml"
            to: "${HOME}/.config/yazi/theme.toml"

  # ── Tools ─────────────────────────────────────────────
  - name: "Tools"
    tools:
      - name: "Bat"
        description: "cat with syntax highlighting"
        checked: true
        steps:
          - type: brew
            package: bat

      - name: "Eza"
        description: "Modern ls replacement"
        checked: true
        steps:
          - type: brew
            package: eza

      - name: "Ripgrep"
        description: "Fast grep"
        checked: true
        steps:
          - type: brew
            package: ripgrep

      - name: "Fd"
        description: "Fast find alternative"
        checked: true
        steps:
          - type: brew
            package: fd

      - name: "Dust"
        description: "Visual disk usage tree (du replacement)"
        checked: true
        steps:
          - type: brew
            package: dust

      - name: "Procs"
        description: "Colorized ps replacement with tree view"
        checked: true
        steps:
          - type: brew
            package: procs

      - name: "Fileicon"
        description: "Set custom icons on files and folders"
        checked: true
        steps:
          - type: brew
            package: fileicon

      - name: "Jq"
        description: "JSON processor"
        checked: true
        steps:
          - type: brew
            package: jq

      - name: "Yq"
        description: "YAML processor"
        checked: true
        steps:
          - type: brew
            package: yq

      - name: "Bottom"
        description: "System monitor"
        checked: true
        steps:
          - type: brew
            package: bottom

      - name: "Hyperfine"
        description: "Command benchmarking tool"
        checked: true
        steps:
          - type: brew
            package: hyperfine

      - name: "Mole"
        description: "Mac cleaning app"
        checked: true
        steps:
          - type: brew
            package: mole

      - name: "Direnv"
        description: "Per-directory env vars"
        checked: true
        steps:
          - type: brew
            package: direnv

      - name: "Ffmpeg"
        description: "Audio/video converter"
        checked: true
        steps:
          - type: brew
            package: ffmpeg

      - name: "Unar"
        description: "Multi-format unarchiver"
        checked: true
        steps:
          - type: brew
            package: unar

  # ── Dev ───────────────────────────────────────────────
  - name: "Dev"
    tools:
      - name: "Pay-respects"
        description: "Command suggestions and typo fixer (thefuck replacement)"
        checked: true
        steps:
          - type: run
            command: "_arch=$(uname -m); case \"$_arch\" in arm64) _arch=aarch64 ;; x86_64) _arch=x86_64 ;; esac; _url=\"https://github.com/iffse/pay-respects/releases/download/nightly/pay-respects-nightly-${_arch}-apple-darwin.tar.zst\"; _tmp=$(mktemp -d); curl -fsSL \"$_url\" -o \"$_tmp/pay-respects.tar.zst\" && mkdir -p \"${HOME}/.local/bin\" && tar -xf \"$_tmp/pay-respects.tar.zst\" -C \"$_tmp\" && cp \"$_tmp/pay-respects\" \"${HOME}/.local/bin/pay-respects\" && cp \"$_tmp/_pay-respects-module-100-runtime-rules\" \"${HOME}/.local/bin/\" && cp \"$_tmp/_pay-respects-fallback-100-request-ai\" \"${HOME}/.local/bin/\" && chmod +x \"${HOME}/.local/bin/pay-respects\" \"${HOME}/.local/bin/_pay-respects-module-100-runtime-rules\" \"${HOME}/.local/bin/_pay-respects-fallback-100-request-ai\"; rm -rf \"$_tmp\""
            skip: "which pay-respects"

      - name: "Mysql Client"
        description: "MySQL database CLI"
        checked: true
        steps:
          - type: brew
            package: mysql-client
          - type: symlink
            from: "home/functions/mysql.zsh"
            to: "${HOME}/.dotfiles-home/functions/mysql.zsh"

      - name: "Sshpass"
        description: "Non-interactive SSH auth"
        checked: true
        steps:
          - type: brew
            package: sshpass

      - name: "Nvm"
        description: "Node version manager (used by Herd)"
        checked: true
        steps:
          - type: brew
            package: nvm

      - name: "Go"
        description: "Go programming language"
        checked: true
        steps:
          - type: brew
            package: go

      - name: "Bun"
        description: "JavaScript runtime & package manager"
        checked: true
        steps:
          - type: brew
            package: bun

      - name: "Composer"
        description: "PHP package manager"
        checked: true
        profiles: ["personal"]
        steps:
          - type: brew
            package: composer
          - type: symlink
            from: "home/aliases/composer.zsh"
            to: "${HOME}/.dotfiles-home/aliases/composer.zsh"

      - name: "Pipx"
        description: "Python package runner"
        checked: true
        steps:
          - type: brew
            package: pipx

      - name: "Dbngin"
        description: "Database manager"
        checked: true
        profiles: ["personal"]
        steps:
          - type: cask
            package: dbngin
            skip: "test -d /Applications/DBngin.app"

      - name: "Mysql-to-sqlite3"
        description: "MySQL to SQLite converter"
        checked: true
        profiles: ["personal"]
        steps:
          - type: brew
            package: mysql-to-sqlite3

      - name: "Sqlite3"
        description: "SQLite CLI"
        checked: true
        steps:
          - type: brew
            package: sqlite

      - name: "OrbStack"
        description: "Docker & Linux VMs"
        checked: true
        steps:
          - type: cask
            package: orbstack
            skip: "test -d /Applications/OrbStack.app"
          - type: symlink
            from: "home/functions/docker.zsh"
            to: "${HOME}/.dotfiles-home/functions/docker.zsh"

      - name: "Herd"
        description: "Laravel dev environment"
        checked: true
        profiles: ["personal"]
        steps:
          - type: cask
            package: herd
            skip: "test -d /Applications/Herd.app"
          - type: symlink
            from: "config/herd/herd.json"
            to: "${HOME}/Library/Application Support/Herd/config/herd.json"
          - type: symlink
            from: "home/aliases/laravel.zsh"
            to: "${HOME}/.dotfiles-home/aliases/laravel.zsh"
          - type: symlink
            from: "home/functions/laravel.zsh"
            to: "${HOME}/.dotfiles-home/functions/laravel.zsh"

      - name: "Git Config"
        description: "Git global settings"
        depends_on: ["Xcode CLT"]
        steps:
          - type: run
            command: "git config --global user.name '${GitName}'"
            skip: "git config --global user.name | grep -q ."
          - type: run
            command: "git config --global user.email '${GitEmail}'"
            skip: "git config --global user.email | grep -q @"
          - type: run
            command: "git config --global core.pager 'hunk pager'"
            skip: "git config --global core.pager | grep -q hunk"
          - type: run
            command: "gh auth setup-git"
            skip: "git config --global credential.https://github.com.helper 2>/dev/null | grep -q gh"
          - type: run
            command: "git config --global core.autocrlf input"
            skip: "git config --global core.autocrlf | grep -q input"
          - type: run
            command: "git config --global push.autoSetupRemote true"
            skip: "git config --global push.autoSetupRemote | grep -q true"
          - type: run
            command: "git config --global help.autocorrect immediate"
            skip: "git config --global help.autocorrect | grep -q immediate"
          - type: run
            command: "git config --global user.signingkey '${GitGPGKey}'"
            skip: "git config --global user.signingkey | grep -q ."
          - type: run
            command: "git config --global commit.gpgsign true"
            skip: "git config --global commit.gpgsign | grep -q true"

      - name: "Global .npmrc"
        description: "npm configuration"
        depends_on: ["Nvm"]
        steps:
          - type: symlink
            from: "config/npm/.npmrc"
            to: "${HOME}/.npmrc"
            skip: "test -f ${HOME}/.npmrc"

  # ── Editors & AI ──────────────────────────────────────
  - name: "Editors & AI"
    tools:
      - name: "Vs Code"
        description: "Editor + settings + extensions"
        checked: true
        steps:
          - type: cask
            package: visual-studio-code
            skip: "test -d '/Applications/Visual Studio Code.app'"
          - type: symlink
            from: "config/vscode/settings.json"
            to: "${HOME}/Library/Application Support/Code/User/settings.json"
          - type: symlink
            from: "config/vscode/keybindings.json"
            to: "${HOME}/Library/Application Support/Code/User/keybindings.json"
          - type: vscode
            extension: "catppuccin.catppuccin-vsc"
          - type: vscode
            extension: "akamud.vscode-theme-onedark"
          - type: vscode
            extension: "pkief.material-icon-theme"
          - type: vscode
            extension: "bmewburn.vscode-intelephense-client"
          - type: vscode
            extension: "laravel.vscode-laravel"
          - type: vscode
            extension: "xdebug.php-debug"
          - type: vscode
            extension: "bradlc.vscode-tailwindcss"
          - type: vscode
            extension: "redhat.vscode-xml"
          - type: vscode
            extension: "redhat.vscode-yaml"
          - type: vscode
            extension: "aaron-bond.better-comments"
          - type: vscode
            extension: "naumovs.color-highlight"
          - type: vscode
            extension: "usernamehw.errorlens"
          - type: vscode
            extension: "yoavbls.pretty-ts-errors"
          - type: vscode
            extension: "biomejs.biome"
          - type: vscode
            extension: "christian-kohler.path-intellisense"
          - type: vscode
            extension: "mechatroner.rainbow-csv"
          - type: vscode
            extension: "waderyan.gitblame"
          - type: vscode
            extension: "anthropic.claude-code"

      - name: "Phpstorm"
        description: "JetBrains PHP IDE"
        checked: true
        steps:
          - type: cask
            package: phpstorm
            skip: "test -d /Applications/PhpStorm.app"

      - name: "Neovim"
        description: "Modern Vim-based editor"
        checked: true
        steps:
          - type: brew
            package: neovim

      - name: "Claude Code"
        description: "Claude AI coding agent"
        checked: true
        steps:
          - type: brew
            package: claude-code
          - type: symlink
            from: "config/claude/settings.json"
            to: "${HOME}/.claude/settings.json"
          - type: symlink
            from: "config/opencode/skills/"
            to: "${HOME}/.claude/skills/"
          - type: symlink
            from: "config/opencode/agents/"
            to: "${HOME}/.claude/agents/"
          - type: symlink
            from: "config/claude/CLAUDE.md"
            to: "${HOME}/.claude/CLAUDE.md"

      - name: "Opencode"
        description: "OpenCode AI coding agent"
        checked: true
        steps:
          - type: brew
            package: opencode
          - type: template-symlink
            from: "config/opencode/opencode.json"
            to: "${HOME}/.config/opencode/opencode.json"
            vars: ["GitHubPAT"]
          - type: symlink
            from: "config/opencode/AGENTS.md"
            to: "${HOME}/.config/opencode/AGENTS.md"
          - type: symlink
            from: "config/opencode/plugins/"
            to: "${HOME}/.config/opencode/plugins/"
          - type: symlink
            from: "config/opencode/skills/"
            to: "${HOME}/.config/opencode/skills/"
          - type: symlink
            from: "config/opencode/themes/"
            to: "${HOME}/.config/opencode/themes/"
          - type: symlink
            from: "config/opencode/agents/"
            to: "${HOME}/.config/opencode/agents/"
          - type: symlink
            from: "config/opencode/commands/"
            to: "${HOME}/.config/opencode/commands/"

      - name: "Google Antigravity"
        description: "Agent CLI tool"
        checked: true
        steps:
          - type: brew
            package: antigravity

      - name: "Grok Build CLI"
        description: "Grok coding agent CLI"
        checked: true
        steps:
          - type: cask
            package: grok-build
            skip: "which grok"

      - name: "Gh"
        description: "GitHub command-line tool"
        checked: true
        steps:
          - type: brew
            package: gh

      - name: "Hunk"
        description: "Review-first terminal diff viewer"
        checked: true
        steps:
          - type: brew
            package: hunk
          - type: symlink
            from: "config/hunk/config.toml"
            to: "${HOME}/.config/hunk/config.toml"

  # ── Apps ──────────────────────────────────────────────
  - name: "Apps"
    tools:
      - name: "Mackup"
        description: "Backup app configs to cloud storage"
        checked: true
        steps:
          - type: brew
            package: mackup
          - type: symlink
            from: "config/mackup/dotfiles-custom.cfg"
            to: "${HOME}/.mackup/dotfiles-custom.cfg"

      - name: "Raycast"
        description: "App launcher and productivity tool"
        checked: true
        steps:
          - type: cask
            package: raycast
            skip: "test -d '/Applications/Raycast.app'"

      - name: "Boring Notch"
