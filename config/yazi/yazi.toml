[manager]
show_hidden = true
show_gitignored = true
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true

[preview]
tab_size = 2
max_width = 600
max_height = 900

[opener]
edit = [{ run = 'code "$1"', block = true }]
open = [{ run = 'open "$1"', orphan = true }]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { name = "*.md", use = "edit" },
  { name = "*.{csv,tsv}", use = "edit" },
  { name = "*.{png,jpg,jpeg,gif,webp,svg}", use = "open" },
  { name = "*.{mp4,mkv,webm,avi,mov}", use = "open" },
  { name = "*.{mp3,flac,wav,ogg,m4a}", use = "open" },
  { name = "*.{pdf,doc,docx,xls,xlsx}", use = "open" },
  { name = "*", use = "open" },
]
